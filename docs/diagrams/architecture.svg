<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg        { fill: #050506; }
      .card      { fill: #0b0c10; stroke: rgba(233,228,218,0.16); stroke-width: 1; }
      .card-root { stroke: rgba(233,228,218,0.4); }
      .title     { fill: #e9e4da; font-family: 'Fraunces', 'Cormorant Garamond', serif; font-style: italic; font-weight: 400; font-size: 17px; }
      .sub       { fill: #6d727b; font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: 0.03em; }
      .edge      { stroke: rgba(233,228,218,0.28); stroke-width: 1.2; fill: none; }
      .edge-acc  { stroke: #3c4b46; stroke-width: 1.4; }
      .kicker    { fill: #6d727b; font-family: 'JetBrains Mono', monospace; font-size: 9.5px; letter-spacing: 0.22em; text-transform: uppercase; }
      .dot       { fill: #e9e4da; fill-opacity: 0.8; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="900" height="480" />

  <g opacity="0.5">
    <circle cx="450" cy="240" r="210" stroke="#e9e4da" stroke-opacity="0.05" fill="none"/>
    <circle cx="450" cy="240" r="150" stroke="#e9e4da" stroke-opacity="0.045" fill="none"/>
    <circle cx="450" cy="240" r="90" stroke="#e9e4da" stroke-opacity="0.04" fill="none"/>
  </g>

  <text class="kicker" x="30" y="34">Component &amp; Route Architecture</text>

  <rect class="card card-root" x="368" y="54" width="164" height="54" rx="3" />
  <text class="title" x="450" y="78" text-anchor="middle">main.tsx</text>
  <text class="sub" x="450" y="96" text-anchor="middle">BrowserRouter root</text>

  <rect class="card card-root" x="368" y="140" width="164" height="54" rx="3" />
  <text class="title" x="450" y="164" text-anchor="middle">App.tsx</text>
  <text class="sub" x="450" y="182" text-anchor="middle">Route table</text>

  <line class="edge" x1="450" y1="108" x2="450" y2="140" />
  <circle class="dot" cx="450" cy="124" r="2" />

  <line class="edge" x1="450" y1="194" x2="130" y2="248" />
  <line class="edge" x1="450" y1="194" x2="370" y2="248" />
  <line class="edge" x1="450" y1="194" x2="590" y2="248" />
  <line class="edge edge-acc" x1="450" y1="194" x2="800" y2="248" />

  <rect class="card" x="50" y="248" width="160" height="52" rx="3" />
  <text class="title" x="130" y="271" text-anchor="middle">Home</text>
  <text class="sub" x="130" y="288" text-anchor="middle">/</text>

  <rect class="card" x="290" y="248" width="160" height="52" rx="3" />
  <text class="title" x="370" y="271" text-anchor="middle">Portfolio</text>
  <text class="sub" x="370" y="288" text-anchor="middle">/portfolio</text>

  <rect class="card" x="510" y="248" width="160" height="52" rx="3" />
  <text class="title" x="590" y="271" text-anchor="middle">Contact</text>
  <text class="sub" x="590" y="288" text-anchor="middle">/contact</text>

  <rect class="card" x="720" y="248" width="160" height="52" rx="3" />
  <text class="title" x="800" y="271" text-anchor="middle">NotFound</text>
  <text class="sub" x="800" y="288" text-anchor="middle">*</text>

  <line class="edge" x1="130" y1="300" x2="130" y2="336" />
  <line class="edge" x1="370" y1="300" x2="330" y2="336" />
  <line class="edge" x1="370" y1="300" x2="410" y2="336" />
  <line class="edge" x1="590" y1="300" x2="590" y2="336" />

  <rect class="card" x="50" y="336" width="160" height="44" rx="3" />
  <text class="title" x="130" y="358" text-anchor="middle" font-size="14">ParticleField</text>
  <text class="sub" x="130" y="373" text-anchor="middle">Canvas particle engine</text>

  <rect class="card" x="250" y="336" width="160" height="44" rx="3" />
  <text class="title" x="330" y="358" text-anchor="middle" font-size="14">ProjectGrid</text>
  <text class="sub" x="330" y="373" text-anchor="middle">Section + card layout</text>

  <rect class="card" x="330" y="392" width="160" height="44" rx="3" />
  <text class="title" x="410" y="414" text-anchor="middle" font-size="14">ProjectCard</text>
  <text class="sub" x="410" y="429" text-anchor="middle">Link out or video open</text>

  <rect class="card" x="510" y="336" width="160" height="44" rx="3" />
  <text class="title" x="590" y="358" text-anchor="middle" font-size="14">VideoModal</text>
  <text class="sub" x="590" y="373" text-anchor="middle">Full screen lightbox</text>

  <line class="edge" x1="330" y1="380" x2="410" y2="392" />

  <line x1="30" y1="452" x2="60" y2="452" class="edge-acc" />
  <text class="sub" x="68" y="456">Wildcard, catch all route</text>
</svg>
